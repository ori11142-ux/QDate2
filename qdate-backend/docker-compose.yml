version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: qdate-mongo
    ports:
      - "27017:27017"
    volumes:
      - qdate_mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdate_mongo_data:
